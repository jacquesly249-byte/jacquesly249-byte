name: Update contribution animation

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/update-contribution-animation.yml"
      - "scripts/build_all_dots_contribution_svg.py"
      - "assets/plants-vs-contributions-base.svg"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contribution-powered garden
        run: >-
          python scripts/build_all_dots_contribution_svg.py
          --base-svg assets/plants-vs-contributions-base.svg
          --out-svg assets/plants-vs-contributions.svg
          --login "${{ github.repository_owner }}"
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}

      - name: Commit refreshed animation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/plants-vs-contributions.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh contribution animation"
          git push
